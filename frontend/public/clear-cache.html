<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Clearing cache…</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050810;color:#fff;font-family:system-ui,sans-serif;
         display:flex;align-items:center;justify-content:center;
         min-height:100vh;text-align:center;padding:20px}
    .wrap{max-width:320px}
    .icon{font-size:3rem;margin-bottom:16px}
    h1{font-size:1.3rem;font-weight:700;margin-bottom:8px;color:#D4AF37}
    p{font-size:0.85rem;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:20px}
    .bar{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;margin-bottom:20px}
    .fill{height:100%;background:#D4AF37;border-radius:99px;animation:fill 2.5s ease forwards}
    @keyframes fill{from{width:0}to{width:100%}}
    .status{font-size:0.75rem;color:rgba(212,175,55,0.7);min-height:20px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="icon">🔄</div>
  <h1>Updating DGC RetailOS…</h1>
  <p>Clearing old cache and loading the latest version.</p>
  <div class="bar"><div class="fill"></div></div>
  <div class="status" id="s">Stopping old service worker…</div>
</div>
<script>
var s = document.getElementById('s');
async function nuke() {
  try {
    s.textContent = 'Stopping old service worker…';
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    s.textContent = 'Wiping cached files…';
    if ('caches' in window) {
      var keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    s.textContent = 'Clearing local storage version…';
    localStorage.removeItem('dgc_sw_version');
    s.textContent = 'Done! Loading fresh version…';
    setTimeout(function() {
      window.location.replace('/?_fresh=' + Date.now());
    }, 800);
  } catch(e) {
    s.textContent = 'Done. Redirecting…';
    setTimeout(function() { window.location.replace('/'); }, 1000);
  }
}
nuke();
</script>
</body>
</html>
