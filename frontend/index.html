<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F6F9FC" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DGC POS" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-180.png" />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Karla:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <title>DGC POS</title>
  <style>
    html, body { background: #f6f9fc !important; margin: 0; min-height: 100dvh; }
    #root { min-height: 100dvh; background: #f6f9fc; }
    #dgc-boot-fallback { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; background: #f6f9fc; color: #071b52; font-family: Inter, system-ui, sans-serif; }
  </style>
  <script>
    (function() {
      window.__DGC_IS_NATIVE__ = /^capacitor:/.test(location.protocol)
        || (location.protocol === 'https:' && location.hostname === 'localhost');

      /* Kill service workers immediately on native — before any module loads */
      if (window.__DGC_IS_NATIVE__ && 'serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          });
        }
      }
    })();
  </script>
</head>
<body>
  <div id="root">
    <div id="dgc-boot-fallback">
      <img src="./dgc-logo-compact.png" alt="" width="72" height="72" style="margin-bottom:20px;object-fit:contain;" onerror="this.style.display='none'" />
      <div style="font-size:1.1rem;font-weight:700;">DGC POS</div>
      <div style="font-size:0.72rem;color:#64748b;margin-top:6px;">Starting…</div>
    </div>
  </div>

  <script>
    (function() {
      var APP_VERSION = '1.2.16';
      var APP_BUILD = '2026.07.08';
      window.__APP_VERSION__ = APP_VERSION;
      window.__APP_BUILD__ = APP_BUILD;
      document.documentElement.dataset.appVersion = APP_VERSION;
      if (window.__DGC_IS_NATIVE__) return;

      var stored = localStorage.getItem('dgc_sw_version');
      if (stored === APP_VERSION) return;
      localStorage.setItem('dgc_sw_version', APP_VERSION);

      var p1 = ('serviceWorker' in navigator)
        ? navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          })
        : Promise.resolve();
      var p2 = ('caches' in window)
        ? caches.keys().then(function(keys) {
            return Promise.all(keys.map(function(k) { return caches.delete(k); }));
          })
        : Promise.resolve();

      Promise.all([p1, p2]).then(function() {
        if (stored !== null && sessionStorage.getItem('dgc_sw_reload_' + APP_VERSION) !== '1') {
          sessionStorage.setItem('dgc_sw_reload_' + APP_VERSION, '1');
          window.location.replace('/?_v=' + APP_VERSION);
        }
      });
    })();
  </script>

  <script>
    function showBootError(title, detail) {
      var el = document.getElementById('dgc-boot-fallback');
      if (!el) return;
      el.innerHTML = '<div style="padding:24px;text-align:center;max-width:360px">'
        + '<div style="font-size:1rem;font-weight:700;margin-bottom:8px">DGC POS</div>'
        + '<div style="font-size:0.72rem;color:#64748b;margin-bottom:12px">' + title + '</div>'
        + (detail ? '<pre style="font-size:0.6rem;color:#ef4444;white-space:pre-wrap;text-align:left;background:rgba(239,68,68,0.06);padding:10px;border-radius:8px;margin-bottom:12px">'
          + detail + '</pre>' : '')
        + '<button type="button" onclick="(function(){try{localStorage.clear();sessionStorage.clear()}catch(e){}if(\'serviceWorker\' in navigator){navigator.serviceWorker.getRegistrations().then(function(r){return Promise.all(r.map(function(x){return x.unregister()}))}).then(function(){if(\'caches\' in window){return caches.keys().then(function(k){return Promise.all(k.map(function(c){return caches.delete(c)}))})}}).finally(function(){location.replace(\'/clear-cache.html\')})}else{location.replace(\'/clear-cache.html\')}})()" '
        + 'style="padding:10px 18px;border-radius:10px;border:none;background:#0B5FFF;color:#fff;font-weight:600;cursor:pointer">Clear cache &amp; reload</button></div>';
    }
    window.addEventListener('error', function(e) {
      var msg = (e.message || 'Load error') + (e.filename ? ' @ ' + e.filename.split('/').pop() : '');
      showBootError('Could not start', msg);
    });
    setTimeout(function() {
      if (window.__DGC_APP_RENDERED__) return;
      var el = document.getElementById('dgc-boot-fallback');
      if (!el || !document.getElementById('dgc-boot-fallback')) return;
      showBootError('Still starting…', 'Cached files may be outdated. Tap below to refresh.');
    }, 12000);
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
